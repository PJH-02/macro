name: scheduled-run

on:
  schedule:
    # 08:30 KST Monday-Friday = 23:30 UTC Sunday-Thursday
    - cron: "30 23 * * 0-4"
    # 18:00 KST Monday-Friday = 09:00 UTC Monday-Friday
    - cron: "0 9 * * 1-5"
  workflow_dispatch:
    inputs:
      run_type:
        description: "Scheduled run type to execute"
        required: true
        type: choice
        options:
          - pre_open
          - post_close
      trading_date:
        description: "Optional KST trading date override (YYYY-MM-DD)"
        required: false
        type: string

jobs:
  scheduled-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve scheduled run context
        shell: bash
        run: |
          set -euo pipefail

          EVENT_NAME="${{ github.event_name }}"
          EVENT_SCHEDULE="${{ github.event.schedule }}"
          INPUT_RUN_TYPE="${{ github.event.inputs.run_type || '' }}"
          INPUT_TRADING_DATE="${{ github.event.inputs.trading_date || '' }}"

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            RUN_TYPE="$INPUT_RUN_TYPE"
            TRADING_DATE="${INPUT_TRADING_DATE:-$(TZ=Asia/Seoul date +%F)}"
          else
            case "$EVENT_SCHEDULE" in
              "30 23 * * 0-4")
                RUN_TYPE="pre_open"
                ;;
              "0 9 * * 1-5")
                RUN_TYPE="post_close"
                ;;
              *)
                echo "Unsupported schedule: $EVENT_SCHEDULE" >&2
                exit 1
                ;;
            esac
            TRADING_DATE="$(TZ=Asia/Seoul date +%F)"
          fi

          ATTEMPTED_AT="$(TZ=Asia/Seoul date --iso-8601=seconds)"
          IS_TRADING_DAY="$(TRADING_DATE="$TRADING_DATE" PYTHONPATH=src:. python3 -c 'from datetime import date; import os; from macro_screener.backtest.calendar import is_trading_day; print("true" if is_trading_day(date.fromisoformat(os.environ["TRADING_DATE"])) else "false")')"

          {
            echo "RUN_TYPE=$RUN_TYPE"
            echo "TRADING_DATE=$TRADING_DATE"
            echo "ATTEMPTED_AT=$ATTEMPTED_AT"
            echo "IS_TRADING_DAY=$IS_TRADING_DAY"
          } >> "$GITHUB_ENV"

      - name: Skip non-trading day
        if: env.IS_TRADING_DAY != 'true'
        run: |
          echo "Skipping scheduled run for non-trading day: $TRADING_DATE"

      - name: Run macro screener scheduled pipeline
        if: env.IS_TRADING_DAY == 'true'
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
        run: |
          set -euo pipefail
          PYTHONPATH=src:. python3 -m macro_screener scheduled-run \
            --config config/github-actions.yaml \
            --trading-date "$TRADING_DATE" \
            --run-type "$RUN_TYPE" \
            --attempted-at "$ATTEMPTED_AT"

      - name: Persist generated src/data outputs
        if: env.IS_TRADING_DAY == 'true'
        shell: bash
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain -- src/data)" ]]; then
            echo "No src/data changes detected after scheduled run."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A src/data
          {
            printf '%s\n' 'Persist scheduled macro outputs' ''
            printf '%s\n' 'GitHub-hosted runners are ephemeral, so the scheduled pipeline'
            printf '%s\n' 'must write tracked src/data outputs back to the branch or the'
            printf '%s\n' 'manual-run-equivalent artifacts disappear after the job ends.' ''
            printf '%s\n' 'Constraint: GitHub-hosted runners are ephemeral, so generated src/data files disappear unless written back to the repository'
            printf '%s\n' 'Rejected: Upload artifacts only | does not update tracked src/data outputs in the repository'
            printf '%s\n' 'Confidence: high'
            printf '%s\n' 'Scope-risk: narrow'
            printf '%s\n' 'Directive: Keep scheduled-run output paths aligned with the manual CLI output root so repo snapshots stay comparable'
            printf '%s\n' 'Tested: scheduled workflow path inspection'
            printf '%s\n' 'Not-tested: concurrent push conflict handling'
          } > /tmp/scheduled-run-commit-message.txt
          git commit -F /tmp/scheduled-run-commit-message.txt
          git pull --rebase origin "$BRANCH_NAME"
          git push origin "HEAD:$BRANCH_NAME"
